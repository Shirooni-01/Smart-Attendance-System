<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            height: 100vh;
            background: linear-gradient(130deg,rgba(102, 201, 255, 1) 0%, rgba(188, 87, 199, 1) 50%, rgba(67, 0, 148, 1) 100%);
            color: white;
        }
        .card {
            margin: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="text-center mb-5">🎓 Smart Attendance System</h1>

        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>Register Student</h5>
                        <a href="/register" class="btn btn-primary btn-lg w-100 mt-3">Register</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>Mark Attendance</h5>
                        <a href="/mark_attendance" class="btn btn-success btn-lg w-100 mt-3">Start Recognition</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>View Attendance</h5>
                        <a href="/view_attendance" class="btn btn-info btn-lg w-100 mt-3">View Records</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
