<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            height: 100vh;
            background: linear-gradient(130deg,rgba(102, 201, 255, 1) 0%, rgba(188, 87, 199, 1) 50%, rgba(67, 0, 148, 1) 100%);
        }

        #video {
            width: 100%;
            max-width: 640px;
            border: 3px solid #28a745;
            border-radius: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .container {
            padding: 30px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 class="mb-4">📍 Mark Attendance</h2>
        <a href="/" class="btn btn-secondary mb-3">← Back to Home</a>

        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <video id="video" autoplay></video>
                <br><br>
                <button id="startBtn" class="btn btn-success btn-lg">Start Recognition</button>
                <button id="stopBtn" class="btn btn-danger btn-lg" style="display:none;">Stop</button>

                <div id="result" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultDiv = document.getElementById('result');

        let stream = null;
        let interval = null;
        let lastMarkedRoll = null;        // ← New: Track last marked student
        let lastMarkedTime = 0;           // ← New: Prevent rapid repeats

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                resultDiv.innerHTML = '<div class="alert alert-info">Camera started. Looking for faces...</div>';
            } catch (err) {
                alert("Cannot access camera.");
            }
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (interval) clearInterval(interval);
            video.srcObject = null;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            resultDiv.innerHTML = '';
            lastMarkedRoll = null;
        }

        async function recognizeFace() {
            const now = Date.now();

            // Prevent checking too frequently
            if (now - lastMarkedTime < 3000) return;   // Wait 3 seconds after marking

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

            try {
                const response = await fetch('/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataUrl })
                });

                const data = await response.json();

                if (data.status === 'success' && data.roll) {
                    // Only mark if different student or enough time passed
                    if (data.roll !== lastMarkedRoll || (now - lastMarkedTime > 10000)) {
                        resultDiv.innerHTML = `
                        <div class="alert alert-success">
                            ✅ Attendance Marked!<br>
                            <strong>${data.name}</strong> (${data.roll})
                        </div>`;

                        lastMarkedRoll = data.roll;
                        lastMarkedTime = now;
                    }
                } else if (data.status === 'info') {
                    resultDiv.innerHTML = `<div class="alert alert-warning">${data.message}</div>`;
                }
            } catch (e) {
                console.error(e);
            }
        }

        startBtn.addEventListener('click', () => {
            startCamera();
            interval = setInterval(recognizeFace, 2000);   // Check every 2 seconds
        });

        stopBtn.addEventListener('click', stopCamera);
    </script>
</body>

</html>
