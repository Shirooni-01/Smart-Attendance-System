<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 30px;
            height: 100vh;
            background: linear-gradient(130deg, rgba(102, 201, 255, 1) 0%, rgba(188, 87, 199, 1) 50%, rgba(67, 0, 148, 1) 100%);
        }

        #video {
            width: 100%;
            max-width: 640px;
            border: 3px solid #007bff;
            border-radius: 10px;
        }

        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .captured img {
            width: 100px;
            border: 2px solid #28a745;
            border-radius: 8px;
        }

        .container {
            padding: 50px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">

        <h2>Register New Student</h2>
        <a href="/" class="btn btn-secondary mb-3">← Back to Home</a>

        <div class="row">
            <div class="col-md-5">
                <form id="registerForm">
                    <div class="mb-3">
                        <label>Student Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label>Roll Number</label>
                        <input type="text" class="form-control" id="roll" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Student</button>
                </form>
            </div>

            <div class="col-md-7">
                <h5>Capture Face Samples (Capture 5-10 images)</h5>
                <video id="video" autoplay></video><br>
                <button id="captureBtn" class="btn btn-success mt-2">Capture Photo</button>
                <button id="trainBtn" class="btn btn-warning mt-2" disabled>Train Model</button>

                <div class="captured" id="capturedImages"></div>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const capturedImagesDiv = document.getElementById('capturedImages');
        let capturedImages = [];

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => video.srcObject = stream);

        document.getElementById('captureBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL('image/jpeg');
            capturedImages.push(dataUrl);

            const img = document.createElement('img');
            img.src = dataUrl;
            capturedImagesDiv.appendChild(img);

            if (capturedImages.length >= 5) {
                document.getElementById('trainBtn').disabled = false;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const roll = document.getElementById('roll').value;

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    roll: roll,
                    images: capturedImages
                })
            });

            const data = await response.json();
            document.getElementById('message').innerHTML = `<div class="alert alert-info">${data.message}</div>`;
        });
    </script>
</body>

</html>
